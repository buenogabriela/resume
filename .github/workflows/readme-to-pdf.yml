name: Generate README PDF

on:
  push:
    paths:
      - README.md
      - pandoc-config.yaml

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-latex-extra

      - name: Generate PDF from README.md
        run: |
          pandoc README.md --defaults pandoc-config.yaml

      - name: Create and Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pdf-build-${{ github.run_number }}
          name: "README PDF (Build ${{ github.run_number }})"
          body: "Automatically generated PDF from the latest README.md"
          files: README.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
