pdf-engine: xelatex
standalone: true

variables:
  # Professional ATS-safe fonts (XeLaTeX only)
  mainfont: "Helvetica"
  fontsize: 10pt

  # Tight but readable margins
  geometry:
    - top=0.4in
    - bottom=0.4in
    - left=0.5in
    - right=0.5in

  # Remove page numbers for a 1-page resume
  header-includes: |
    \usepackage{enumitem}
    \setlist[itemize]{noitemsep, topsep=0pt} % Tightens bullet points
    \usepackage{titlesec}
    \titleformat{\section}{\large\bfseries\uppercase}{}{0pt}{}[\titlerule]

  # Spacing and Links
  linestretch: 1.15
  colorlinks: true
  urlcolor: blue