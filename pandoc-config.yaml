pdf-engine: xelatex
standalone: true
output-file: README.pdf

metadata:
  title: "Resume - Guilherme Stella"

header-includes: |
  \pagestyle{empty}
  \usepackage{enumitem}
  \setlist[itemize]{noitemsep, topsep=2pt, parsep=2pt, partopsep=0pt, leftmargin=*} 
  \usepackage{titlesec}
  \titleformat{\section}{\large\bfseries\uppercase}{}{0pt}{}[\titlerule]
  \titlespacing*{\section}{0pt}{12pt}{8pt}

variables:
  mainfont: "Helvetica"
  fontsize: 10pt
  geometry:
    - top=0.4in
    - bottom=0.4in
    - left=0.5in
    - right=0.5in
  linestretch: 1.15
  colorlinks: true
  urlcolor: blue